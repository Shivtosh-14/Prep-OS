<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Login - Prep OS</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
	<style>
		:root {
			--bg: #190019; /* black background */
			--card: #2B124C; /* purple boxes */
			--card-2: #522B5B; /* lighter purple for elements */
			--muted: #DFB6B2; /* muted text */
			--text: #FBE4D8; /* primary text */
			--cream: #FBE4D8; /* text on dark */
			--accent: #522B5B; /* purple accent */
			--accent-2: #2B124C; /* deeper purple */
			--success: #4caf50;
			--error: #f44336;
		}
		* { box-sizing: border-box; }
		html, body { height: 100%; }
		body {
			margin: 0;
			font-family: Manrope, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
			background: var(--bg);
			color: var(--text);
			display: flex;
			align-items: center;
			justify-content: center;
			min-height: 100vh;
			padding: 20px;
		}
		.login-container {
			background: var(--card);
			border: 1px solid #6d5147;
			border-radius: 20px;
			box-shadow: 0 10px 30px rgba(0,0,0,0.15);
			padding: 40px;
			width: 100%;
			max-width: 400px;
			color: var(--cream);
		}
		.back-btn {
			background: none;
			border: none;
			color: var(--cream);
			font-size: 18px;
			cursor: pointer;
			margin-bottom: 20px;
			text-decoration: none;
			display: inline-flex;
			align-items: center;
			gap: 8px;
			transition: color 0.2s ease;
		}
		.back-btn:hover {
			color: var(--accent);
		}
		.login-title {
			font-size: 28px;
			font-weight: 700;
			margin: 0 0 8px 0;
			text-align: center;
			color: var(--cream);
		}
		.login-subtitle {
			font-size: 14px;
			color: var(--muted);
			text-align: center;
			margin: 0 0 30px 0;
		}
		.form-group {
			margin-bottom: 20px;
		}
		.form-label {
			display: block;
			font-size: 14px;
			font-weight: 600;
			margin-bottom: 8px;
			color: var(--cream);
		}
		.form-input {
			width: 100%;
			background: var(--cream);
			border: 1px solid #cbb7ae;
			border-radius: 8px;
			padding: 12px 16px;
			font-size: 16px;
			color: var(--text);
			outline: none;
			transition: border-color 0.2s ease;
		}
		.form-input:focus {
			border-color: var(--accent);
		}
		.form-input:disabled {
			opacity: 0.6;
			cursor: not-allowed;
		}
		.submit-btn {
			width: 100%;
			background: var(--accent);
			border: none;
			border-radius: 8px;
			padding: 14px;
			color: var(--cream);
			font-size: 16px;
			font-weight: 600;
			cursor: pointer;
			transition: background-color 0.2s ease;
			margin-top: 10px;
		}
		.submit-btn:hover:not(:disabled) {
			background: var(--accent-2);
		}
		.submit-btn:disabled {
			opacity: 0.6;
			cursor: not-allowed;
		}
		.otp-container {
			display: none;
		}
		.otp-inputs {
			display: flex;
			gap: 10px;
			justify-content: center;
			margin: 20px 0;
		}
		.otp-input {
			width: 50px;
			height: 50px;
			background: var(--cream);
			border: 1px solid #cbb7ae;
			border-radius: 8px;
			text-align: center;
			font-size: 20px;
			font-weight: 600;
			color: var(--text);
			outline: none;
			transition: border-color 0.2s ease;
		}
		.otp-input:focus {
			border-color: var(--accent);
		}
		.resend-btn {
			background: none;
			border: 1px solid var(--accent);
			border-radius: 6px;
			padding: 8px 16px;
			color: var(--accent);
			font-size: 12px;
			cursor: pointer;
			transition: all 0.2s ease;
			margin-top: 10px;
		}
		.resend-btn:hover {
			background: var(--accent);
			color: var(--cream);
		}
		.resend-btn:disabled {
			opacity: 0.5;
			cursor: not-allowed;
		}
		.username-container {
			display: none;
		}
		.username-preview {
			background: var(--accent);
			border-radius: 8px;
			padding: 12px;
			margin: 10px 0;
			text-align: center;
			font-weight: 600;
		}
		.message {
			padding: 12px;
			border-radius: 8px;
			margin: 15px 0;
			font-size: 14px;
			text-align: center;
		}
		.message.success {
			background: rgba(76, 175, 80, 0.2);
			border: 1px solid var(--success);
			color: #4caf50;
		}
		.message.error {
			background: rgba(244, 67, 54, 0.2);
			border: 1px solid var(--error);
			color: #f44336;
		}
		.message.info {
			background: rgba(139, 94, 71, 0.2);
			border: 1px solid var(--accent);
			color: var(--accent);
		}
		.timer {
			color: var(--muted);
			font-size: 12px;
			text-align: center;
			margin-top: 10px;
		}
		.step-indicator {
			display: flex;
			justify-content: center;
			gap: 10px;
			margin-bottom: 30px;
		}
		.step {
			width: 30px;
			height: 30px;
			border-radius: 50%;
			background: var(--card-2);
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 12px;
			font-weight: 600;
			color: var(--muted);
			transition: all 0.3s ease;
		}
		.step.active {
			background: var(--accent);
			color: var(--cream);
		}
		.step.completed {
			background: var(--success);
			color: var(--cream);
		}
	</style>
</head>
<body>
	<div class="login-container">
		<a href="prototype.html" class="back-btn">← Back to Home</a>
		
		<div class="step-indicator">
			<div class="step active" id="step1">1</div>
			<div class="step" id="step2">2</div>
			<div class="step" id="step3">3</div>
		</div>

		<h1 class="login-title">Welcome to Prep OS</h1>
		<p class="login-subtitle">Sign in with your email to get started</p>

		<div id="messageContainer"></div>

		<!-- Step 1: Email Input -->
		<div id="emailStep">
			<div class="form-group">
				<label class="form-label" for="emailInput">Email Address</label>
				<input type="email" id="emailInput" class="form-input" placeholder="Enter your email address" required>
			</div>
			<button class="submit-btn" onclick="sendOTP()" id="sendOTPBtn">Send OTP</button>
		</div>

		<!-- Step 2: OTP Verification -->
		<div class="otp-container" id="otpStep">
			<p class="login-subtitle">Enter the 6-digit code sent to your email</p>
			<div class="otp-inputs">
				<input type="text" class="otp-input" maxlength="1" data-index="0">
				<input type="text" class="otp-input" maxlength="1" data-index="1">
				<input type="text" class="otp-input" maxlength="1" data-index="2">
				<input type="text" class="otp-input" maxlength="1" data-index="3">
				<input type="text" class="otp-input" maxlength="1" data-index="4">
				<input type="text" class="otp-input" maxlength="1" data-index="5">
			</div>
			<button class="submit-btn" onclick="verifyOTP()" id="verifyOTPBtn">Verify OTP</button>
			<button class="resend-btn" onclick="resendOTP()" id="resendBtn">Resend OTP</button>
			<div class="timer" id="timer">Resend available in <span id="countdown">60</span>s</div>
		</div>

		<!-- Step 3: Username Creation -->
		<div class="username-container" id="usernameStep">
			<p class="login-subtitle">Create your username</p>
			<div class="form-group">
				<label class="form-label" for="usernameInput">Username</label>
				<input type="text" id="usernameInput" class="form-input" placeholder="Choose a username" maxlength="20" required>
				<div class="username-preview" id="usernamePreview">@username</div>
			</div>
			<button class="submit-btn" onclick="createAccount()" id="createAccountBtn">Create Account</button>
		</div>
	</div>

	<script>
		let currentStep = 1;
		let userEmail = '';
		let otpCode = '';
		let otpTimer = null;
		let resendTimer = null;

		// Initialize
		document.addEventListener('DOMContentLoaded', function() {
			// Check if user is already logged in
			const userData = localStorage.getItem('prepOS_user');
			if (userData) {
				window.location.href = 'prototype.html';
				return;
			}

			// Setup OTP input handling
			setupOTPInputs();
			
			// Setup username input handling
			document.getElementById('usernameInput').addEventListener('input', updateUsernamePreview);
		});

		function showMessage(text, type = 'info') {
			const container = document.getElementById('messageContainer');
			container.innerHTML = `<div class="message ${type}">${text}</div>`;
		}

		function updateStep(step) {
			// Update step indicators
			for (let i = 1; i <= 3; i++) {
				const stepEl = document.getElementById(`step${i}`);
				if (i < step) {
					stepEl.classList.remove('active');
					stepEl.classList.add('completed');
				} else if (i === step) {
					stepEl.classList.add('active');
					stepEl.classList.remove('completed');
				} else {
					stepEl.classList.remove('active', 'completed');
				}
			}

			// Show/hide steps
			document.getElementById('emailStep').style.display = step === 1 ? 'block' : 'none';
			document.getElementById('otpStep').style.display = step === 2 ? 'block' : 'none';
			document.getElementById('usernameStep').style.display = step === 3 ? 'block' : 'none';

			currentStep = step;
		}

		function generateOTP() {
			return Math.floor(100000 + Math.random() * 900000).toString();
		}

		function sendOTP() {
			const email = document.getElementById('emailInput').value.trim();
			
			if (!email || !isValidEmail(email)) {
				showMessage('Please enter a valid email address', 'error');
				return;
			}

			userEmail = email;
			otpCode = generateOTP();
			
			// Simulate sending OTP (in real app, this would call your backend)
			console.log(`OTP for ${email}: ${otpCode}`);
			
			showMessage(`OTP sent to ${email}`, 'success');
			updateStep(2);
			startOTPTimer();
		}

		function verifyOTP() {
			const enteredOTP = Array.from(document.querySelectorAll('.otp-input'))
				.map(input => input.value)
				.join('');

			if (enteredOTP.length !== 6) {
				showMessage('Please enter all 6 digits', 'error');
				return;
			}

			if (enteredOTP === otpCode) {
				showMessage('OTP verified successfully!', 'success');
				updateStep(3);
				clearOTPTimer();
			} else {
				showMessage('Invalid OTP. Please try again.', 'error');
				// Clear OTP inputs
				document.querySelectorAll('.otp-input').forEach(input => input.value = '');
				document.querySelector('.otp-input').focus();
			}
		}

		function resendOTP() {
			otpCode = generateOTP();
			console.log(`New OTP for ${userEmail}: ${otpCode}`);
			
			showMessage('New OTP sent to your email', 'success');
			startOTPTimer();
			
			// Clear OTP inputs
			document.querySelectorAll('.otp-input').forEach(input => input.value = '');
			document.querySelector('.otp-input').focus();
		}

		function startOTPTimer() {
			let timeLeft = 60;
			const countdownEl = document.getElementById('countdown');
			const resendBtn = document.getElementById('resendBtn');
			
			resendBtn.disabled = true;
			
			otpTimer = setInterval(() => {
				timeLeft--;
				countdownEl.textContent = timeLeft;
				
				if (timeLeft <= 0) {
					clearInterval(otpTimer);
					resendBtn.disabled = false;
					document.getElementById('timer').style.display = 'none';
				}
			}, 1000);
		}

		function clearOTPTimer() {
			if (otpTimer) {
				clearInterval(otpTimer);
				otpTimer = null;
			}
		}

		function setupOTPInputs() {
			const otpInputs = document.querySelectorAll('.otp-input');
			
			otpInputs.forEach((input, index) => {
				input.addEventListener('input', (e) => {
					const value = e.target.value;
					
					// Only allow numbers
					if (!/^\d$/.test(value)) {
						e.target.value = '';
						return;
					}
					
					// Move to next input
					if (value && index < otpInputs.length - 1) {
						otpInputs[index + 1].focus();
					}
				});
				
				input.addEventListener('keydown', (e) => {
					// Handle backspace
					if (e.key === 'Backspace' && !e.target.value && index > 0) {
						otpInputs[index - 1].focus();
					}
				});
				
				input.addEventListener('paste', (e) => {
					e.preventDefault();
					const pastedData = e.clipboardData.getData('text');
					const digits = pastedData.replace(/\D/g, '').slice(0, 6);
					
					digits.split('').forEach((digit, i) => {
						if (otpInputs[i]) {
							otpInputs[i].value = digit;
						}
					});
					
					// Focus last filled input
					const lastFilledIndex = Math.min(digits.length - 1, otpInputs.length - 1);
					otpInputs[lastFilledIndex].focus();
				});
			});
		}

		function updateUsernamePreview() {
			const username = document.getElementById('usernameInput').value.trim();
			const preview = document.getElementById('usernamePreview');
			
			if (username) {
				preview.textContent = `@${username}`;
				preview.style.display = 'block';
			} else {
				preview.style.display = 'none';
			}
		}

		function createAccount() {
			const username = document.getElementById('usernameInput').value.trim();
			
			if (!username || username.length < 3) {
				showMessage('Username must be at least 3 characters long', 'error');
				return;
			}
			
			if (!/^[a-zA-Z0-9_]+$/.test(username)) {
				showMessage('Username can only contain letters, numbers, and underscores', 'error');
				return;
			}
			
			// Check if username already exists (in real app, check against database)
			const existingUsers = JSON.parse(localStorage.getItem('prepOS_users') || '[]');
			if (existingUsers.some(user => user.username.toLowerCase() === username.toLowerCase())) {
				showMessage('Username already taken. Please choose another.', 'error');
				return;
			}
			
			// Create user account
			const userData = {
				email: userEmail,
				username: username,
				createdAt: new Date().toISOString()
			};
			
			// Save user to localStorage
			existingUsers.push(userData);
			localStorage.setItem('prepOS_users', JSON.stringify(existingUsers));
			localStorage.setItem('prepOS_user', JSON.stringify(userData));
			
			showMessage('Account created successfully! Redirecting...', 'success');
			
			// Redirect to homepage after a short delay
			setTimeout(() => {
				window.location.href = 'prototype.html';
			}, 1500);
		}

		function isValidEmail(email) {
			const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
			return emailRegex.test(email);
		}
	</script>

	<!-- Firebase SDK -->
	<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
	<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
	<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

	<script>
		// Firebase configuration
		const firebaseConfig = {
			apiKey: "AIzaSyB5tK8nsxBWREkBVyeogbQm8WruN1_G_M0",
			authDomain: "prep-os.firebaseapp.com",
			projectId: "prep-os",
			storageBucket: "prep-os.firebasestorage.app",
			messagingSenderId: "979113812615",
			appId: "1:979113812615:web:639eae04a51b7991ea0e22",
			measurementId: "G-CMLKQ4P8KF"
		};

		// Initialize Firebase
		firebase.initializeApp(firebaseConfig);
		const auth = firebase.auth();
		const db = firebase.firestore();

		// Google Sign-In function
		function signInWithGoogle() {
			const provider = new firebase.auth.GoogleAuthProvider();
			auth.signInWithPopup(provider)
				.then((result) => {
					// User signed in successfully
					console.log('User signed in:', result.user);
					// Redirect to homepage
					window.location.href = 'prototype.html';
				})
				.catch((error) => {
					// Handle errors
					console.error('Sign-in error:', error);
					alert('Sign-in failed: ' + error.message);
				});
		}

		// Check if user is already signed in
		auth.onAuthStateChanged((user) => {
			if (user) {
				// User is already signed in, redirect to homepage
				window.location.href = 'prototype.html';
			}
		});
	</script>
</body>
</html>
